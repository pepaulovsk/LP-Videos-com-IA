document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html lang=\"pt-BR\"><head>\n<meta charset=\"utf-8\">\n<title>Criando Vídeos com IA · MBX Academy<\u002Ftitle>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<style>/* ============================================================\n   LP — Criando Vídeos com IA · hi-fi styles\n   ============================================================ */\n\n/* ---------- FONTS ---------- */\n@font-face{font-family:'Satoshi';src:url(\"b1487403-b475-4bb2-b7f2-b9a0a6edbc09\") format('opentype');font-weight:300;font-style:normal;font-display:swap}\n@font-face{font-family:'Satoshi';src:url(\"09451924-4dec-4011-99c4-a5e72cae1970\") format('opentype');font-weight:400;font-style:normal;font-display:swap}\n@font-face{font-family:'Satoshi';src:url(\"759fc17c-a59a-46d5-8521-ff6f299ce570\") format('opentype');font-weight:400;font-style:italic;font-display:swap}\n@font-face{font-family:'Satoshi';src:url(\"560e07e2-f81b-40de-9c8d-3c3a429d3460\") format('opentype');font-weight:500;font-style:normal;font-display:swap}\n@font-face{font-family:'Satoshi';src:url(\"a99c2feb-db1e-4d30-9dff-8e9d54c4bcb8\") format('opentype');font-weight:700;font-style:normal;font-display:swap}\n@font-face{font-family:'Satoshi';src:url(\"1d4e6247-0b5e-4073-a02a-9f452ecaf0df\") format('opentype');font-weight:700;font-style:italic;font-display:swap}\n@font-face{font-family:'Satoshi';src:url(\"b3fa486d-0be5-4942-92e4-70c031c4689d\") format('opentype');font-weight:900;font-style:normal;font-display:swap}\n\n/* ---------- TOKENS ---------- */\n:root{\n  --bg:#0E0B08;\n  --bg-soft:#15110D;\n  --bg-card:#1A1612;\n  --ink:#F2EBDF;\n  --ink-2:#C9C0B2;\n  --muted:#857C70;\n  --line:#2A241D;\n\n  --terra:oklch(0.62 0.16 42);          /* terracota queimado — CTA */\n  --terra-hi:oklch(0.70 0.17 45);\n  --terra-deep:oklch(0.46 0.14 38);\n  --amber:oklch(0.82 0.13 78);          /* destaques, hover */\n  --amber-soft:oklch(0.92 0.06 80);\n\n  --ease-out:cubic-bezier(.16,1,.3,1);\n  --ease-soft:cubic-bezier(.4,0,.2,1);\n  --ease-elastic:cubic-bezier(.34,1.56,.64,1);\n\n  --radius:6px;\n  --container:1280px;\n  --gutter:clamp(16px,5vw,72px);\n}\n\n/* ---------- RESET ---------- */\n*,*::before,*::after{box-sizing:border-box}\nhtml,body{margin:0;padding:0}\nhtml{scroll-behavior:smooth;background:var(--bg)}\nbody{\n  font-family:'Satoshi','Inter',system-ui,sans-serif;\n  font-weight:400;\n  background:var(--bg);\n  color:var(--ink);\n  -webkit-font-smoothing:antialiased;\n  text-rendering:optimizeLegibility;\n  overflow-x:hidden;\n}\nimg,svg,video{display:block;max-width:100%}\nbutton{font:inherit;color:inherit;background:none;border:none;cursor:pointer}\na{color:inherit;text-decoration:none}\nul{list-style:none;margin:0;padding:0}\n\n/* ---------- TYPE ---------- */\n.h-display{\n  font-weight:900;\n  font-size:clamp(40px, 6.4vw, 96px);\n  line-height:.95;\n  letter-spacing:-0.025em;\n  text-wrap:balance;\n}\n.h-1{\n  font-weight:900;\n  font-size:clamp(32px, 4.4vw, 64px);\n  line-height:1.0;\n  letter-spacing:-0.02em;\n  text-wrap:balance;\n}\n.h-2{\n  font-weight:700;\n  font-size:clamp(22px, 2vw, 28px);\n  line-height:1.2;\n  letter-spacing:-0.01em;\n}\n.eyebrow{\n  font-family:'Satoshi',sans-serif;\n  font-size:11px;\n  font-weight:500;\n  letter-spacing:.22em;\n  text-transform:uppercase;\n  color:var(--terra-hi);\n  display:inline-flex;align-items:center;gap:10px;\n}\n.eyebrow::before{\n  content:\"\";display:inline-block;width:24px;height:1px;background:currentColor;\n}\n.lead{\n  font-size:clamp(17px,1.4vw,20px);\n  line-height:1.55;\n  color:var(--ink-2);\n  max-width:62ch;\n  font-weight:400;\n}\n.body{\n  font-size:16px;line-height:1.65;color:var(--ink-2);max-width:60ch;\n}\n.italic{font-style:italic;font-weight:300}\n\n/* ---------- LAYOUT ---------- */\n.container{\n  max-width:var(--container);\n  margin:0 auto;\n  padding-left:var(--gutter);\n  padding-right:var(--gutter);\n  width:100%;\n}\n.section{\n  position:relative;\n  padding-block:clamp(72px,10vw,160px);\n}\n@media (max-width:720px){\n  :root{--gutter:18px}\n  .section{padding-block:64px}\n  .container{padding-left:var(--gutter);padding-right:var(--gutter)}\n}\n.section + .section{border-top:1px solid var(--line)}\n\n/* ---------- BUTTONS ---------- */\n.btn{\n  --bg-btn:var(--terra);\n  --fg-btn:#1a0e07;\n  position:relative;\n  display:inline-flex;align-items:center;gap:14px;\n  padding:18px 28px;\n  background:var(--bg-btn);\n  color:var(--fg-btn);\n  font-weight:700;\n  font-size:15px;\n  letter-spacing:.005em;\n  border-radius:999px;\n  overflow:hidden;\n  white-space:nowrap;\n  transition:transform .4s var(--ease-out), background .3s var(--ease-soft), box-shadow .4s var(--ease-out);\n  will-change:transform;\n  isolation:isolate;\n}\n.btn:hover{\n  background:var(--terra-hi);\n  box-shadow:0 18px 40px -12px oklch(0.62 0.16 42 / .55);\n}\n.btn .arrow{\n  width:20px;height:20px;display:inline-flex;align-items:center;justify-content:center;\n  transition:transform .4s var(--ease-out);\n}\n.btn:hover .arrow{transform:translateX(4px)}\n.btn::after{\n  content:\"\";position:absolute;inset:0;z-index:-1;\n  background:radial-gradient(circle at var(--mx,50%) var(--my,50%), oklch(0.82 0.14 78 / .55), transparent 60%);\n  opacity:0;transition:opacity .3s;\n}\n.btn:hover::after{opacity:1}\n\n.btn-lg{padding:22px 34px;font-size:16px}\n.btn-xl{padding:24px 38px;font-size:17px;width:100%;justify-content:center}\n.btn-ghost{\n  --bg-btn:transparent;\n  --fg-btn:var(--ink);\n  border:1px solid var(--line);\n}\n.btn-ghost:hover{\n  --bg-btn:var(--bg-card);\n  background:var(--bg-card);\n  border-color:var(--terra);\n  box-shadow:none;\n}\n\n/* ---------- NAV ---------- */\n.nav{\n  position:fixed;top:0;left:0;right:0;z-index:50;\n  display:flex;align-items:center;justify-content:space-between;\n  padding:18px var(--gutter);\n  transition:background .35s var(--ease-soft), backdrop-filter .35s var(--ease-soft), border-color .35s, transform .45s var(--ease-out);\n  border-bottom:1px solid transparent;\n}\n.nav.hidden{transform:translateY(-110%)}\n.nav.scrolled{\n  background:rgba(14,11,8,.72);\n  backdrop-filter:blur(18px) saturate(140%);\n  -webkit-backdrop-filter:blur(18px) saturate(140%);\n  border-bottom-color:var(--line);\n}\n.nav .logo{\n  display:flex;align-items:center;gap:10px;\n  font-weight:700;font-size:16px;letter-spacing:-.01em;\n}\n.nav .logo-mark{\n  width:28px;height:28px;border-radius:50%;\n  background:radial-gradient(circle at 30% 30%, var(--amber), var(--terra) 60%, var(--terra-deep));\n  position:relative;overflow:hidden;\n}\n.nav .logo-mark::after{\n  content:\"\";position:absolute;inset:0;\n  background:radial-gradient(circle at 70% 70%, rgba(255,255,255,.15), transparent 40%);\n}\n.nav .links{display:flex;gap:30px;font-size:14px;color:var(--ink-2)}\n.nav .links a{position:relative;transition:color .3s}\n.nav .links a::after{\n  content:\"\";position:absolute;left:0;right:0;bottom:-6px;height:1px;\n  background:var(--terra);transform:scaleX(0);transform-origin:left;transition:transform .35s var(--ease-out);\n}\n.nav .links a:hover{color:var(--ink)}\n.nav .links a:hover::after{transform:scaleX(1)}\n.nav .cta{\n  padding:10px 18px;font-size:13px;\n}\n@media (max-width:880px){.nav .links{display:none}}\n\n/* ============================================================\n   HERO · S1 — 100vh\n   ============================================================ */\n.hero{\n  position:relative;\n  height:100vh;min-height:680px;\n  width:100%;\n  overflow:hidden;\n  padding:0;\n}\n.hero .video-wrap{\n  position:absolute;inset:0;\n  will-change:transform;\n}\n.hero .video-wrap::before{\n  content:\"\";position:absolute;inset:0;z-index:2;\n  background:\n    linear-gradient(180deg, rgba(14,11,8,.45) 0%, rgba(14,11,8,.20) 30%, rgba(14,11,8,.85) 90%),\n    radial-gradient(circle at 30% 20%, oklch(0.46 0.14 38 / .25), transparent 50%);\n}\n.hero .video-wrap::after{\n  /* film grain */\n  content:\"\";position:absolute;inset:0;z-index:3;pointer-events:none;\n  background-image:url(\"data:image/svg+xml;base64,PHN2ZyB4bWxucz0naHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmcnIHdpZHRoPScxODAnIGhlaWdodD0nMTgwJz48ZmlsdGVyIGlkPSduJz48ZmVUdXJidWxlbmNlIGJhc2VGcmVxdWVuY3k9JzEuMScgbnVtT2N0YXZlcz0nMicgc3RpdGNoVGlsZXM9J3N0aXRjaCcvPjxmZUNvbG9yTWF0cml4IHZhbHVlcz0nMCAwIDAgMCAwLjk1IDAgMCAwIDAgMC44NSAwIDAgMCAwIDAuNyAwIDAgMCAwLjEwIDAnLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0nMTAwJScgaGVpZ2h0PScxMDAlJyBmaWx0ZXI9J3VybCglMjNuKScvPjwvc3ZnPg==\");\n  opacity:.5;mix-blend-mode:overlay;\n}\n.hero video, .hero .video-fallback{\n  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;\n}\n.hero .video-fallback{\n  background:\n    radial-gradient(ellipse at 20% 30%, oklch(0.42 0.12 40) 0%, transparent 55%),\n    radial-gradient(ellipse at 80% 70%, oklch(0.32 0.08 30) 0%, transparent 60%),\n    linear-gradient(180deg, #1a1410 0%, #0e0b08 100%);\n}\n.hero .video-fallback::before{\n  content:\"\";position:absolute;inset:0;\n  background-image:\n    repeating-linear-gradient(135deg, rgba(255,200,140,.04) 0 1px, transparent 1px 14px);\n}\n.hero .content{\n  position:absolute;inset:0;z-index:5;\n  display:flex;flex-direction:column;justify-content:flex-end;\n  padding:0 var(--gutter) clamp(80px,12vh,140px);\n  max-width:var(--container);margin:0 auto;left:0;right:0;\n}\n.hero .urgency{\n  display:inline-flex;align-items:center;gap:10px;\n  font-size:11px;font-weight:500;letter-spacing:.18em;text-transform:uppercase;\n  color:var(--amber);\n  border:1px solid oklch(0.82 0.13 78 / .35);\n  background:oklch(0.82 0.13 78 / .08);\n  border-radius:999px;\n  padding:8px 16px;\n  margin-bottom:32px;\n  width:fit-content;\n  backdrop-filter:blur(8px);\n}\n.hero .urgency .pulse{\n  width:7px;height:7px;border-radius:50%;background:var(--amber);\n  box-shadow:0 0 0 0 oklch(0.82 0.13 78 / .9);\n  animation:pulse 1.8s var(--ease-out) infinite;\n}\n@keyframes pulse{\n  0%{box-shadow:0 0 0 0 oklch(0.82 0.13 78 / .8)}\n  70%{box-shadow:0 0 0 12px oklch(0.82 0.13 78 / 0)}\n  100%{box-shadow:0 0 0 0 oklch(0.82 0.13 78 / 0)}\n}\n\n.hero h1{\n  margin:0 0 28px;\n  font-weight:900;\n  font-size:clamp(38px, 5.6vw, 84px);\n  line-height:.98;\n  letter-spacing:-0.025em;\n  max-width:18ch;\n  color:var(--ink);\n}\n.hero h1 .accent{color:var(--amber);font-style:italic;font-weight:700}\n/* word reveal */\n.hero h1 .word{\n  display:inline-block;vertical-align:bottom;\n  padding:0 0.04em 0.22em;margin:0 -0.04em -0.22em;\n  clip-path:inset(0 0 0.22em 0);\n  transition:clip-path 1s var(--ease-out);\n  transition-delay:calc(var(--i,0) * 60ms + 200ms);\n}\n.hero.ready h1 .word{\n  clip-path:inset(-0.25em -0.05em 0 -0.05em);\n}\n.hero h1 .word > span{\n  display:inline-block;transform:translateY(110%);\n  transition:transform 1s var(--ease-out);\n  transition-delay:calc(var(--i,0) * 60ms + 200ms);\n}\n.hero.ready h1 .word > span{transform:translateY(0)}\n\n.hero .sub{\n  font-size:clamp(16px,1.4vw,20px);\n  line-height:1.5;\n  color:var(--ink-2);\n  max-width:56ch;\n  margin:0 0 40px;\n  opacity:0;transform:translateY(20px);\n  transition:opacity .9s var(--ease-out) .6s, transform .9s var(--ease-out) .6s;\n}\n.hero.ready .sub{opacity:1;transform:none}\n\n.hero .cta-row{\n  display:flex;align-items:center;gap:24px;flex-wrap:wrap;\n  opacity:0;transform:translateY(20px);\n  transition:opacity .9s var(--ease-out) .8s, transform .9s var(--ease-out) .8s;\n}\n.hero.ready .cta-row{opacity:1;transform:none}\n.hero .microproof{\n  font-size:13px;color:var(--muted);\n  display:flex;align-items:center;gap:10px;\n}\n.hero .avatars{display:flex}\n.hero .avatars span{\n  width:28px;height:28px;border-radius:50%;\n  background:linear-gradient(135deg,var(--terra-deep),var(--terra));\n  border:2px solid var(--bg);margin-left:-8px;\n  display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700;\n}\n.hero .avatars span:first-child{margin-left:0;background:linear-gradient(135deg,oklch(0.55 0.12 30), oklch(0.65 0.14 50))}\n.hero .avatars span:nth-child(2){background:linear-gradient(135deg,oklch(0.45 0.10 25), oklch(0.60 0.13 45))}\n.hero .avatars span:nth-child(3){background:linear-gradient(135deg,oklch(0.50 0.13 60), oklch(0.70 0.15 80))}\n\n/* hero meta strip */\n.hero .meta-strip{\n  position:absolute;left:var(--gutter);right:var(--gutter);bottom:32px;\n  z-index:6;\n  display:flex;justify-content:space-between;align-items:flex-end;\n  pointer-events:none;\n  font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);\n}\n.hero .meta-strip > div{display:flex;gap:24px;flex-wrap:wrap}\n.hero .meta-strip b{color:var(--ink);font-weight:500}\n@media (max-width:880px){\n  .hero .meta-strip{display:none}\n  .hero .scroll-indicator{bottom:16px}\n}\n\n/* scroll indicator */\n.scroll-indicator{\n  position:absolute;left:50%;bottom:24px;transform:translateX(-50%);\n  z-index:6;\n  display:flex;flex-direction:column;align-items:center;gap:10px;\n  pointer-events:none;\n  opacity:0;\n  animation:fadeIn 1s var(--ease-out) 1.6s forwards;\n}\n@keyframes fadeIn{to{opacity:1}}\n.scroll-indicator .mouse{\n  width:24px;height:38px;border:1.5px solid var(--ink-2);border-radius:14px;\n  position:relative;\n}\n.scroll-indicator .mouse::after{\n  content:\"\";position:absolute;left:50%;top:8px;transform:translateX(-50%);\n  width:3px;height:7px;border-radius:2px;background:var(--amber);\n  animation:scrollDot 1.8s var(--ease-out) infinite;\n}\n@keyframes scrollDot{\n  0%{transform:translate(-50%,0);opacity:1}\n  60%{transform:translate(-50%,12px);opacity:0}\n  100%{transform:translate(-50%,0);opacity:0}\n}\n.scroll-indicator .label{\n  font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);\n}\n@media (max-height:680px){.scroll-indicator{display:none}}\n\n/* ============================================================\n   S2 — DOR\n   ============================================================ */\n.s-dor{background:var(--bg)}\n.s-dor .grid{\n  display:grid;grid-template-columns:1fr 1fr;gap:clamp(40px,6vw,90px);\n  align-items:start;\n}\n.s-dor .grid > div:first-child{position:sticky;top:120px}\n@media (max-width:880px){\n  .s-dor .grid{grid-template-columns:1fr;gap:36px}\n  .s-dor .grid > div:first-child{position:static}\n}\n.pain-list{display:grid;gap:14px}\n.pain-item{\n  display:grid;grid-template-columns:auto 1fr;gap:24px;\n  padding:22px 24px;\n  border:1px solid var(--line);\n  background:var(--bg-soft);\n  border-radius:var(--radius);\n  transition:transform .5s var(--ease-out), border-color .4s, background .4s;\n  position:relative;overflow:hidden;\n}\n.pain-item .num{\n  font-family:'Satoshi',monospace;font-size:13px;font-weight:500;color:var(--muted);\n  letter-spacing:.05em;\n  transition:color .3s;\n}\n.pain-item p{margin:0;font-size:15.5px;line-height:1.55;color:var(--ink-2)}\n.pain-item:hover{\n  transform:translateX(8px);\n  border-color:var(--terra);\n  background:var(--bg-card);\n}\n.pain-item:hover .num{color:var(--terra-hi)}\n.pain-item::before{\n  content:\"\";position:absolute;left:0;top:0;bottom:0;width:2px;\n  background:var(--terra);transform:scaleY(0);transform-origin:bottom;\n  transition:transform .5s var(--ease-out);\n}\n.pain-item:hover::before{transform:scaleY(1);transform-origin:top}\n\n.dor-closer{\n  margin-top:48px;\n  font-size:clamp(22px,2.4vw,32px);\n  font-weight:700;line-height:1.2;letter-spacing:-.015em;\n  color:var(--ink);\n  border-top:1px solid var(--line);padding-top:32px;\n  max-width:24ch;\n}\n.dor-closer em{font-style:italic;color:var(--terra-hi);font-weight:700}\n\n/* ============================================================\n   S3 — FUTURO (grid de vídeos)\n   ============================================================ */\n.s-futuro{\n  background:linear-gradient(180deg, var(--bg) 0%, var(--bg-soft) 100%);\n}\n.futuro-head{display:flex;justify-content:space-between;align-items:flex-end;gap:40px;margin-bottom:60px;flex-wrap:wrap}\n.futur
